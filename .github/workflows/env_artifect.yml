name: Upload Artifact Example

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

jobs:
  create-and-upload-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create local artifact file
        run: |
          mkdir -p artifacts
          echo "Artifact created by GitHub Actions at $(date)" > artifacts/build-artifact.txt
          echo "This file stores the upload operation details." >> artifacts/build-artifact.txt
          echo "Upload step: actions/upload-artifact@v7" >> artifacts/build-artifact.txt
          ls -l artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: local-artifact
          path: artifacts/build-artifact.txt
